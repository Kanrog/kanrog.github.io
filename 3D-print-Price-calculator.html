<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Print Price Calculator</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --primary-color: #a855f7;
            --primary-hover: #c084fc;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #2e2e33;
            --accent-bg: #2e1065; /* Deep purple background for the summary box */
            --accent-text: #e9d5ff; /* Bright purple/magenta text for summary highlights */
            --sub-calc-bg: #252529;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--text-color);
            margin-bottom: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .currency-selector-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            background: var(--card-bg);
            padding: 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .currency-selector-container label {
            margin-bottom: 0;
            font-weight: 600;
            color: var(--text-color);
        }

        select {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            color: var(--text-color);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .power-calc-box {
            background: var(--sub-calc-bg);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 8px;
            margin-top: 8px;
        }

        .power-calc-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
        }

        .live-calc-badge {
            display: inline-block;
            margin-top: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-hover);
            background: rgba(168, 85, 247, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .result-box {
            background: var(--accent-bg);
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            margin-top: 24px;
        }

        .total-price {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-text);
            margin: 10px 0 0 0;
        }

        .breakdown {
            margin-top: 18px;
            font-size: 0.9rem;
            text-align: left;
            color: var(--text-color);
            border-top: 1px dashed rgba(168, 85, 247, 0.3);
            padding-top: 12px;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        
        .breakdown-item span:last-child {
            color: var(--accent-text);
            font-weight: 600;
        }
        
        small {
            display: block;
            margin-top: 4px;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>3D Print Price Calculator</h1>
    
    <div class="currency-selector-container">
        <label for="currencySelect">Select Currency:</label>
        <select id="currencySelect" onchange="handleCurrencyChange()">
            <option value="NOK">NOK (kr)</option>
            <option value="USD">USD ($)</option>
            <option value="EUR">EUR (€)</option>
            <option value="GBP">GBP (£)</option>
        </select>
    </div>
    
    <div class="grid">
        <div class="card">
            <div class="card-title">Project Details</div>
            
            <div class="form-group">
                <label for="filamentAmount">Filament Amount (grams)</label>
                <input type="number" id="filamentAmount" value="150" min="0" oninput="calculatePrice()">
            </div>
            
            <div class="form-group">
                <label for="shippingCost">Filament Shipping Cost (<span class="currency-label">NOK</span>)</label>
                <input type="number" id="shippingCost" value="79" min="0" oninput="calculatePrice()">
            </div>
            
            <div class="form-group">
                <label for="printTime">Print Time (hours)</label>
                <input type="number" id="printTime" value="12" min="0" step="0.1" oninput="calculatePrice()">
            </div>
            
            <div class="form-group">
                <label for="designTime">Design Time (hours)</label>
                <input type="number" id="designTime" value="1" min="0" step="0.1" oninput="calculatePrice()">
            </div>
            
            <div class="form-group">
                <label for="workTime">Prep/Post-Work Time (hours)</label>
                <input type="number" id="workTime" value="0.5" min="0" step="0.1" oninput="calculatePrice()">
            </div>
        </div>

        <div class="card">
            <div class="card-title">Rates & Settings (Defaults)</div>
            
            <div class="form-group">
                <label for="filamentCostKg">Filament Cost per kg (<span class="currency-label">NOK</span>)</label>
                <input type="number" id="filamentCostKg" value="350" min="0" oninput="calculatePrice()">
            </div>
            
            <div class="form-group">
                <label>Power Cost Estimation</label>
                <div class="power-calc-box">
                    <div class="power-calc-title">Electricity Sub-Calculator</div>
                    
                    <div class="form-group" style="margin-bottom: 12px;">
                        <label for="powerCostKwh" style="font-size: 0.8rem;">Rate per kWh (<span class="currency-label">NOK</span>)</label>
                        <input type="number" id="powerCostKwh" value="1.25" min="0" step="0.01" oninput="calculatePrice()">
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 5px;">
                        <label for="printerWatts" style="font-size: 0.8rem;">Avg Printer Draw (Watts)</label>
                        <input type="number" id="printerWatts" value="300" min="0" step="10" oninput="calculatePrice()">
                    </div>
                    
                    <div class="live-calc-badge">
                        Calculated Rate: <span id="hourlyPowerCostBadge">0.00</span> <span class="currency-label">NOK</span> / hr
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="designRate">Hourly Design Rate (<span class="currency-label">NOK</span>)</label>
                <input type="number" id="designRate" value="300" min="0" oninput="calculatePrice()">
            </div>
            
            <div class="form-group">
                <label for="workRate">Hourly Labor Rate (<span class="currency-label">NOK</span>)</label>
                <input type="number" id="workRate" value="200" min="0" oninput="calculatePrice()">
            </div>
        </div>
    </div>

    <div class="result-box">
        <span style="font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted);">Estimated Total Price</span>
        <div class="total-price" id="totalDisplay">0.00 NOK</div>
        
        <div class="breakdown">
            <div class="breakdown-item"><span>Material + Shipping:</span> <span id="breakdownMaterial">0.00 NOK</span></div>
            <div class="breakdown-item"><span>Power Allocation:</span> <span id="breakdownPower">0.00 NOK</span></div>
            <div class="breakdown-item"><span>Design Fee:</span> <span id="breakdownDesign">0.00 NOK</span></div>
            <div class="breakdown-item"><span>Labor Fee:</span> <span id="breakdownLabor">0.00 NOK</span></div>
        </div>
    </div>
</div>

<script>
let currentCurrency = "NOK";

// Geographic average pricing anchors
const regionalAverages = {
    NOK: { kwhCost: 1.25, filament: 350, design: 300, labor: 200, shipping: 79 },
    USD: { kwhCost: 0.18, filament: 30,   design: 35,  labor: 25,  shipping: 8  },
    EUR: { kwhCost: 0.29, filament: 28,   design: 32,  labor: 22,  shipping: 7  },
    GBP: { kwhCost: 0.26, filament: 25,   design: 30,  labor: 20,  shipping: 6  }
};

function handleCurrencyChange() {
    currentCurrency = document.getElementById('currencySelect').value;
    
    // Update text labels
    const labels = document.getElementsByClassName('currency-label');
    for (let i = 0; i < labels.length; i++) {
        labels[i].innerText = currentCurrency;
    }

    // Apply baseline anchors automatically
    const defaults = regionalAverages[currentCurrency];
    if (defaults) {
        document.getElementById('powerCostKwh').value = defaults.kwhCost;
        document.getElementById('filamentCostKg').value = defaults.filament;
        document.getElementById('designRate').value = defaults.design;
        document.getElementById('workRate').value = defaults.labor;
        document.getElementById('shippingCost').value = defaults.shipping;
    }

    calculatePrice();
}

function calculatePrice() {
    // Inputs
    const filamentGrams = parseFloat(document.getElementById('filamentAmount').value) || 0;
    const shippingCost = parseFloat(document.getElementById('shippingCost').value) || 0;
    const printTime = parseFloat(document.getElementById('printTime').value) || 0;
    const designTime = parseFloat(document.getElementById('designTime').value) || 0;
    const workTime = parseFloat(document.getElementById('workTime').value) || 0;

    // Rates & Power Calculation Sub-elements
    const filamentCostKg = parseFloat(document.getElementById('filamentCostKg').value) || 0;
    const powerCostKwh = parseFloat(document.getElementById('powerCostKwh').value) || 0;
    const printerWatts = parseFloat(document.getElementById('printerWatts').value) || 0;
    const designRate = parseFloat(document.getElementById('designRate').value) || 0;
    const workRate = parseFloat(document.getElementById('workRate').value) || 0;

    // Calculate hourly rate profile
    const calculatedHourlyPowerCost = (printerWatts / 1000) * powerCostKwh;
    
    // Update live badge view
    document.getElementById('hourlyPowerCostBadge').innerText = calculatedHourlyPowerCost.toFixed(3);

    // Final Cost Calculations
    const materialCost = (filamentGrams * (filamentCostKg / 1000)) + shippingCost;
    const powerCost = printTime * calculatedHourlyPowerCost;
    const designCost = designTime * designRate;
    const laborCost = workTime * workRate;

    const totalPrice = materialCost + powerCost + designCost + laborCost;

    // Update Output displays
    document.getElementById('totalDisplay').innerText = `${totalPrice.toFixed(2)} ${currentCurrency}`;
    document.getElementById('breakdownMaterial').innerText = `${materialCost.toFixed(2)} ${currentCurrency}`;
    document.getElementById('breakdownPower').innerText = `${powerCost.toFixed(2)} ${currentCurrency}`;
    document.getElementById('breakdownDesign').innerText = `${designCost.toFixed(2)} ${currentCurrency}`;
    document.getElementById('breakdownLabor').innerText = `${laborCost.toFixed(2)} ${currentCurrency}`;
}

window.onload = function() {
    handleCurrencyChange();
};
</script>

</body>
</html>
