<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Price Calc</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Price Calc">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#121212">

    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%23121212'><rect width='100' height='100' rx='22' fill='%231e1e1e'/><path d='M35 30h40l-6 28H41L33 20H20' stroke='%2300adb5' stroke-width='6' stroke-linecap='round' stroke-linejoin='round' fill='none'/><circle cx='44' cy='72' r='7' fill='%2300adb5'/><circle cx='68' cy='72' r='7' fill='%2300adb5'/></svg>">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%23121212'><rect width='100' height='100' rx='22' fill='%231e1e1e'/><path d='M35 30h40l-6 28H41L33 20H20' stroke='%2300adb5' stroke-width='6' stroke-linecap='round' stroke-linejoin='round' fill='none'/><circle cx='44' cy='72' r='7' fill='%2300adb5'/><circle cx='68' cy='72' r='7' fill='%2300adb5'/></svg>">

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #00adb5;
            --text-color: #eeeeee;
            --text-muted: #888888;
            --input-bg: #2d2d2d;
            --border-color: #3d3d3d;
            --toggle-bg: #252525;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 15px;
            padding-top: env(safe-area-inset-top, 15px);
        }

        .calculator-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            margin-top: 10px;
        }

        .mode-container {
            display: flex;
            background-color: var(--toggle-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px 5px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 14px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
        }

        .flex-inputs {
            display: flex;
            gap: 10px;
        }

        .flex-inputs .amount {
            flex: 2;
        }

        .flex-inputs .unit, .flex-inputs .currency {
            flex: 1;
        }

        .results-container {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .result-label {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .result-value.secondary {
            font-size: 1.1rem;
            color: var(--text-color);
        }

        .btn-clear {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 15px;
            transition: background 0.2s, color 0.2s;
        }

        .btn-clear:hover, .btn-clear:active {
            background-color: #2a2a2a;
            color: var(--text-color);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <div class="mode-container">
            <button class="mode-btn active" id="mode-calc-unit" onclick="setMode('calc-unit')">Find Unit Price</button>
            <button class="mode-btn" id="mode-calc-item" onclick="setMode('calc-item')">Find Item Price</button>
        </div>
        
        <div class="input-group">
            <label id="label-primary-input" for="primary-input">Sale Price</label>
            <div class="flex-inputs">
                <div class="amount" style="flex: 2.5;">
                    <input type="number" id="primary-input" inputmode="decimal" step="any" placeholder="0.00" autocomplete="off">
                </div>
                <div class="currency" style="flex: 1;">
                    <select id="currency" onchange="updateCurrencySymbols()">
                        <option value="kr" selected>NOK (kr)</option>
                        <option value="$">USD ($)</option>
                        <option value="€">EUR (€)</option>
                        <option value="£">GBP (£)</option>
                        <option value="kr.">SEK/DKK</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label id="label-secondary-input" for="quantity">Package Size / Weight</label>
            <div class="flex-inputs">
                <div class="amount">
                    <input type="number" id="quantity" inputmode="decimal" step="any" placeholder="e.g. 450 or 1.5" autocomplete="off">
                </div>
                <div class="unit">
                    <select id="unit">
                        <option value="g">g</option>
                        <option value="kg" selected>kg</option>
                        <option value="ml">ml</option>
                        <option value="l">L</option>
                        <option value="pcs" id="unit-pcs-option">item</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="results-container">
            <div class="result-row">
                <span class="result-label" id="result-label-1">Price per kg:</span>
                <span class="result-value" id="result-val-1">--</span>
            </div>
            <div class="result-row" id="secondary-row">
                <span class="result-label" id="result-label-2">Price per 100g:</span>
                <span class="result-value secondary" id="result-val-2">--</span>
            </div>
        </div>

        <button class="btn-clear" id="clear-btn">Clear fields</button>
    </div>

    <script>
        let currentMode = 'calc-unit';
        let currentSymbol = 'kr';

        const primaryInput = document.getElementById('primary-input');
        const quantityInput = document.getElementById('quantity');
        const unitSelect = document.getElementById('unit');
        const currencySelect = document.getElementById('currency');
        const unitPcsOption = document.getElementById('unit-pcs-option');
        
        const labelPrimaryInput = document.getElementById('label-primary-input');
        const labelSecondaryInput = document.getElementById('label-secondary-input');
        
        const resultLabel1 = document.getElementById('result-label-1');
        const resultVal1 = document.getElementById('result-val-1');
        const secondaryRow = document.getElementById('secondary-row');
        const resultLabel2 = document.getElementById('result-label-2');
        const resultVal2 = document.getElementById('result-val-2');
        
        const clearBtn = document.getElementById('clear-btn');

        function updateCurrencySymbols() {
            currentSymbol = currencySelect.value;
            calculate();
        }

        function formatCurrency(amount) {
            // Places suffix for Scandinavian crowns, prefix for standard western symbols
            if (currentSymbol === 'kr' || currentSymbol === 'kr.') {
                return `${amount.toFixed(2)} ${currentSymbol}`;
            } else {
                return `${currentSymbol}${amount.toFixed(2)}`;
            }
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-calc-unit').classList.toggle('active', mode === 'calc-unit');
            document.getElementById('mode-calc-item').classList.toggle('active', mode === 'calc-item');
            
            primaryInput.value = '';
            quantityInput.value = '';
            
            if (currentMode === 'calc-unit') {
                labelPrimaryInput.textContent = 'Sale Price';
                labelSecondaryInput.textContent = 'Package Size / Weight';
                unitPcsOption.style.display = 'block';
                if(unitSelect.value === '') unitSelect.value = 'kg';
            } else {
                labelPrimaryInput.textContent = 'Price per Bulk Unit';
                labelSecondaryInput.textContent = 'Item Weight / Volume';
                unitPcsOption.style.display = 'none';
                if (unitSelect.value === 'pcs') unitSelect.value = 'kg';
            }
            
            calculate();
            primaryInput.focus();
        }

        function calculate() {
            const val1 = parseFloat(primaryInput.value);
            const qty = parseFloat(quantityInput.value);
            const unit = unitSelect.value;

            if (isNaN(val1) || isNaN(qty) || qty <= 0 || val1 < 0) {
                resultVal1.textContent = '--';
                secondaryRow.style.display = 'none';
                return;
            }

            if (currentMode === 'calc-unit') {
                let pricePerBase = 0;
                let baseUnit = '';
                let showSecondary = false;
                let pricePerSub = 0;
                let subUnit = '';

                switch (unit) {
                    case 'g':
                        pricePerBase = val1 / (qty / 1000);
                        baseUnit = 'kg';
                        pricePerSub = val1 / (qty / 100);
                        subUnit = '100g';
                        showSecondary = true;
                        break;
                    case 'kg':
                        pricePerBase = val1 / qty;
                        baseUnit = 'kg';
                        pricePerSub = val1 / (qty * 10);
                        subUnit = '100g';
                        showSecondary = true;
                        break;
                    case 'ml':
                        pricePerBase = val1 / (qty / 1000);
                        baseUnit = 'L';
                        pricePerSub = val1 / (qty / 100);
                        subUnit = '100ml';
                        showSecondary = true;
                        break;
                    case 'l':
                        pricePerBase = val1 / qty;
                        baseUnit = 'L';
                        pricePerSub = val1 / (qty * 10);
                        subUnit = '100ml';
                        showSecondary = true;
                        break;
                    case 'pcs':
                        pricePerBase = val1 / qty;
                        baseUnit = 'item';
                        showSecondary = false;
                        break;
                }

                resultLabel1.textContent = `Price per ${baseUnit}:`;
                resultVal1.textContent = formatCurrency(pricePerBase);

                if (showSecondary) {
                    secondaryRow.style.display = 'flex';
                    resultLabel2.textContent = `Price per ${subUnit}:`;
                    resultVal2.textContent = formatCurrency(pricePerSub);
                } else {
                    secondaryRow.style.display = 'none';
                }

            } else {
                let itemPrice = 0;
                secondaryRow.style.display = 'none';

                switch (unit) {
                    case 'g':
                    case 'ml':
                        itemPrice = val1 * (qty / 1000);
                        break;
                    case 'kg':
                    case 'l':
                        itemPrice = val1 * qty;
                        break;
                }

                resultLabel1.textContent = 'Estimated Item Price:';
                resultVal1.textContent = formatCurrency(itemPrice);
            }
        }

        primaryInput.addEventListener('input', calculate);
        quantityInput.addEventListener('input', calculate);
        unitSelect.addEventListener('change', calculate);

        clearBtn.addEventListener('click', () => {
            primaryInput.value = '';
            quantityInput.value = '';
            resultVal1.textContent = '--';
            secondaryRow.style.display = 'none';
            primaryInput.focus();
        });

        setMode('calc-unit');
    </script>
</body>
</html>
