<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Shopping Calculator</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #00adb5;
            --text-color: #eeeeee;
            --text-muted: #888888;
            --input-bg: #2d2d2d;
            --border-color: #3d3d3d;
            --toggle-bg: #252525;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 15px;
        }

        .calculator-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            margin-top: 10px;
        }

        /* Mode Selector Toggle */
        .mode-container {
            display: flex;
            background-color: var(--toggle-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px 5px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
        }

        .flex-inputs {
            display: flex;
            gap: 10px;
        }

        .flex-inputs .amount {
            flex: 2;
        }

        .flex-inputs .unit {
            flex: 1;
        }

        .results-container {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .result-label {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .result-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .result-value.secondary {
            font-size: 1rem;
            color: var(--text-color);
        }

        .btn-clear {
            width: 100%;
            padding: 10px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 15px;
            transition: background 0.2s, color 0.2s;
        }

        .btn-clear:hover, .btn-clear:active {
            background-color: #2a2a2a;
            color: var(--text-color);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <div class="mode-container">
            <button class="mode-btn active" id="mode-calc-unit" onclick="setMode('calc-unit')">Find Unit Price</button>
            <button class="mode-btn" id="mode-calc-item" onclick="setMode('calc-item')">Find Item Price</button>
        </div>
        
        <div class="input-group">
            <label id="label-primary-input" for="primary-input">Sale Price</label>
            <input type="number" id="primary-input" inputmode="decimal" step="any" placeholder="0.00" autocomplete="off">
        </div>

        <div class="input-group">
            <label id="label-secondary-input" for="quantity">Package Size / Weight</label>
            <div class="flex-inputs">
                <div class="amount">
                    <input type="number" id="quantity" inputmode="decimal" step="any" placeholder="e.g. 450 or 1.5" autocomplete="off">
                </div>
                <div class="unit">
                    <select id="unit">
                        <option value="g">g</option>
                        <option value="kg" selected>kg</option>
                        <option value="ml">ml</option>
                        <option value="l">L</option>
                        <option value="pcs" id="unit-pcs-option">item</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="results-container">
            <div class="result-row">
                <span class="result-label" id="result-label-1">Price per kg/L/item:</span>
                <span class="result-value" id="result-val-1">--</span>
            </div>
            <div class="result-row" id="secondary-row">
                <span class="result-label" id="result-label-2">Price per 100g/ml:</span>
                <span class="result-value secondary" id="result-val-2">--</span>
            </div>
        </div>

        <button class="btn-clear" id="clear-btn">Clear fields</button>
    </div>

    <script>
        let currentMode = 'calc-unit'; // 'calc-unit' or 'calc-item'

        const primaryInput = document.getElementById('primary-input');
        const quantityInput = document.getElementById('quantity');
        const unitSelect = document.getElementById('unit');
        const unitPcsOption = document.getElementById('unit-pcs-option');
        
        const labelPrimaryInput = document.getElementById('label-primary-input');
        const labelSecondaryInput = document.getElementById('label-secondary-input');
        
        const resultLabel1 = document.getElementById('result-label-1');
        const resultVal1 = document.getElementById('result-val-1');
        const secondaryRow = document.getElementById('secondary-row');
        const resultLabel2 = document.getElementById('result-label-2');
        const resultVal2 = document.getElementById('result-val-2');
        
        const clearBtn = document.getElementById('clear-btn');

        function setMode(mode) {
            currentMode = mode;
            
            // Update active state toggles
            document.getElementById('mode-calc-unit').classList.toggle('active', mode === 'calc-unit');
            document.getElementById('mode-calc-item').classList.toggle('active', mode === 'calc-item');
            
            // Reset fields
            primaryInput.value = '';
            quantityInput.value = '';
            
            if (currentMode === 'calc-unit') {
                labelPrimaryInput.textContent = 'Sale Price';
                labelSecondaryInput.textContent = 'Package Size / Weight';
                unitPcsOption.style.display = 'block'; // Show "item" option
                if(unitSelect.value === '') unitSelect.value = 'kg';
            } else {
                labelPrimaryInput.textContent = 'Price per Bulk Unit (per kg or L)';
                labelSecondaryInput.textContent = 'Item Weight / Volume';
                unitPcsOption.style.display = 'none'; // Hide "item" option since it doesn't apply
                if (unitSelect.value === 'pcs') {
                    unitSelect.value = 'kg';
                }
            }
            
            calculate();
            primaryInput.focus();
        }

        function calculate() {
            const val1 = parseFloat(primaryInput.value);
            const qty = parseFloat(quantityInput.value);
            const unit = unitSelect.value;

            if (isNaN(val1) || isNaN(qty) || qty <= 0 || val1 < 0) {
                resultVal1.textContent = '--';
                secondaryRow.style.display = 'none';
                return;
            }

            if (currentMode === 'calc-unit') {
                // MODE 1: Input total sale price and size -> Outputs price per kg/L/item
                let pricePerBase = 0;
                let baseUnit = '';
                let showSecondary = false;
                let pricePerSub = 0;
                let subUnit = '';

                switch (unit) {
                    case 'g':
                        pricePerBase = val1 / (qty / 1000);
                        baseUnit = 'kg';
                        pricePerSub = val1 / (qty / 100);
                        subUnit = '100g';
                        showSecondary = true;
                        break;
                    case 'kg':
                        pricePerBase = val1 / qty;
                        baseUnit = 'kg';
                        pricePerSub = val1 / (qty * 10);
                        subUnit = '100g';
                        showSecondary = true;
                        break;
                    case 'ml':
                        pricePerBase = val1 / (qty / 1000);
                        baseUnit = 'L';
                        pricePerSub = val1 / (qty / 100);
                        subUnit = '100ml';
                        showSecondary = true;
                        break;
                    case 'l':
                        pricePerBase = val1 / qty;
                        baseUnit = 'L';
                        pricePerSub = val1 / (qty * 10);
                        subUnit = '100ml';
                        showSecondary = true;
                        break;
                    case 'pcs':
                        pricePerBase = val1 / qty;
                        baseUnit = 'item';
                        showSecondary = false;
                        break;
                }

                resultLabel1.textContent = `Price per ${baseUnit}:`;
                resultVal1.textContent = pricePerBase.toFixed(2);

                if (showSecondary) {
                    secondaryRow.style.display = 'flex';
                    resultLabel2.textContent = `Price per ${subUnit}:`;
                    resultVal2.textContent = pricePerSub.toFixed(2);
                } else {
                    secondaryRow.style.display = 'none';
                }

            } else {
                // MODE 2: Input unit price (per kg/L) and item weight -> Outputs specific item cost
                let itemPrice = 0;
                secondaryRow.style.display = 'none'; // No sub-units needed here

                switch (unit) {
                    case 'g':
                    case 'ml':
                        // If user inputs weight in g/ml, convert to kg/L to match the bulk unit price
                        itemPrice = val1 * (qty / 1000);
                        break;
                    case 'kg':
                    case 'l':
                        itemPrice = val1 * qty;
                        break;
                }

                resultLabel1.textContent = 'Estimated Item Price:';
                resultVal1.textContent = itemPrice.toFixed(2);
            }
        }

        // Setup live calculations
        primaryInput.addEventListener('input', calculate);
        quantityInput.addEventListener('input', calculate);
        unitSelect.addEventListener('change', calculate);

        // Clear everything
        clearBtn.addEventListener('click', () => {
            primaryInput.value = '';
            quantityInput.value = '';
            resultVal1.textContent = '--';
            secondaryRow.style.display = 'none';
            primaryInput.focus();
        });

        // Initialize defaults
        setMode('calc-unit');
    </script>
</body>
</html>
